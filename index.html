<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth State Machine PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.header{background:#123a7a;padding:14px;text-align:center;font-weight:bold}
.card{background:#111a2e;margin:10px;padding:12px;border-radius:10px}
input{width:100%;padding:8px;margin-top:5px;border-radius:6px;border:none}
button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
.win{background:#39d353}
.loss{background:#dc2626;color:white}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
th,td{border:1px solid #222c44;padding:5px;text-align:center}
</style>
</head>

<body>

<div class="header">WEALTH STATE MACHINE PRO (FIXED DEEP START)</div>

<div class="card">
Starting Balance
<input id="startBal" type="number" value="85">

Base Trade
<input id="baseTrade" type="number" value="2.8">

<button onclick="apply()">APPLY</button>
</div>

<div class="card">
Balance: <b id="bal"></b><br>
Trade: <b id="trd"></b><br>
Mode: <b id="mode"></b><br>
Step: <b id="step"></b><br>
Wins: <b id="wins"></b><br>
Loss Streak: <b id="loss"></b>
</div>

<div class="card">
<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

// ================= STATE =================
const STATE = {
mode: "NORMAL",
step: 0,
wins: 0,
lossStreak: 0,
locked: false
};

let balance = 0;
let base = 2.8;
let ladder = [];
let history = [];

// ================= APPLY =================
function apply(){

base = Number(document.getElementById("baseTrade").value);
balance = Number(document.getElementById("startBal").value);

ladder = [
base,
base*1.55,
base*2.34,
base*3.5,
base*5.25,
base*7.87
];

STATE.mode = "NORMAL";
STATE.step = 0;
STATE.wins = 0;
STATE.lossStreak = 0;
STATE.locked = false;

history = [];

render();
}

// ================= TRADE =================
function getTrade(){
return ladder[Math.min(STATE.step, ladder.length-1)];
}

// ================= LOSS (FIXED ORDER - CRITICAL) =================
function loss(){

if(STATE.locked) return;
STATE.locked = true;

// STEP 1: increment loss FIRST
STATE.lossStreak++;

// STEP 2: check deep mode IMMEDIATELY
if(STATE.lossStreak >= 5){
STATE.mode = "DEEP";
}

// STEP 3: take trade AFTER mode is correct
const t = getTrade();
balance -= t;

// STEP 4: move step AFTER execution
STATE.step = Math.min(STATE.step + 1, ladder.length - 1);

STATE.wins = 0;

history.push({r:"LOSS", t, ret:0});

STATE.locked = false;
render();
}

// ================= WIN =================
function win(){

if(STATE.locked) return;
STATE.locked = true;

const t = getTrade();
const ret = t * 0.92;

balance += ret;
STATE.wins++;

history.push({r:"WIN", t, ret});

// ================= NORMAL MODE =================
if(STATE.mode === "NORMAL"){

if(STATE.wins >= 2){
STATE.step = 0;
STATE.wins = 0;
}
else{
STATE.step = Math.max(0, STATE.step - 1);
}

}

// ================= DEEP MODE =================
else{

const deepPath = [5,4,2]; // 22.04 → 14.70 → 6.55

const idx = STATE.wins - 1;

if(idx < deepPath.length){
STATE.step = deepPath[idx];
}

// RESET AFTER 3 WINS
if(STATE.wins >= 3){
STATE.step = 0;
STATE.wins = 0;
STATE.lossStreak = 0;
STATE.mode = "NORMAL";
}

}

STATE.locked = false;
render();
}

// ================= UI =================
function render(){

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + getTrade().toFixed(2);
document.getElementById("mode").innerText = STATE.mode;
document.getElementById("step").innerText = STATE.step;
document.getElementById("wins").innerText = STATE.wins;
document.getElementById("loss").innerText = STATE.lossStreak;

let html = "";

history.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x.r}</td>
<td>$${x.t.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("log").innerHTML = html;
}

render();

</script>

</body>
</html>
