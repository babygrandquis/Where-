<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Ladder Locked</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
background:#123a7a;
padding:14px;
text-align:center;
font-weight:bold;
}

.card{
background:#111a2e;
margin:10px;
padding:12px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.win{background:#39d353;}
.loss{background:#dc2626;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

th,td{
border:1px solid #222c44;
padding:5px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">WEALTH LADDER SYSTEM (FIXED PATH)</div>

<div class="card">

Starting Balance
<input id="startBal" type="number" value="85">

Base Trade
<input id="baseTrade" type="number" value="2.8">

<button onclick="apply()">APPLY</button>

</div>

<div class="card">
Balance: <b id="bal"></b><br>
Trade: <b id="trd"></b><br>
Index: <b id="idx"></b>
</div>

<div class="card">
<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

let balance = 0;
let index = 0;

let ladder = [];
let history = [];

function apply(){

let base = Number(document.getElementById("baseTrade").value);
balance = Number(document.getElementById("startBal").value);

// FIXED LADDER (NOT CALCULATED EVERY TIME)
ladder = [
base,
base * 1.55,
base * 2.34,
base * 3.5,
base * 5.25,
base * 7.87,
base * 7.87 * 1.4,   // 22.04 peak level
base * 7.87,
base * 5.25,
base * 3.5,
base * 2.34,
base * 1.55,
base
];

index = 0;
history = [];

update();
}

function trade(){
return ladder[index];
}

function loss(){

let t = trade();
balance -= t;

if(index < ladder.length - 1){
index++;
}

history.push({r:"LOSS", t:t, ret:0});

update();
}

function win(){

let t = trade();
let ret = t * 0.92;

balance += ret;

if(index > 0){
index--;
}

history.push({r:"WIN", t:t, ret:ret});

update();
}

function update(){

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + trade().toFixed(2);
document.getElementById("idx").innerText = index;

let html = "";

history.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x.r}</td>
<td>$${x.t.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("log").innerHTML = html;
}

update();

</script>

</body>
</html>
