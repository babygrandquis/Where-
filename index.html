<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Warriors Trade Manager</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
background:#123a7a;
padding:14px;
text-align:center;
font-weight:bold;
}

.card{
background:#111a2e;
margin:10px;
padding:12px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.win{background:#39d353;}
.loss{background:#dc2626;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

th,td{
border:1px solid #222c44;
padding:5px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">WEALTH WARRIORS TRADE MANAGER</div>

<div class="card">
Starting Balance
<input id="startBal" type="number" value="85">

Base Trade
<input id="baseTrade" type="number" value="2.8">

<button onclick="apply()">APPLY SETTINGS</button>
</div>

<div class="card">
Balance: <b id="bal">$0.00</b><br>
Trade: <b id="trd">$0.00</b><br>
Step: <b id="step">0</b><br>
Mode: <b id="mode">NORMAL</b><br>
Wins: <b id="wins">0</b>
</div>

<div class="card">
<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

let balance = 0;
let base = 2.8;
let step = 0;
let wins = 0;
let mode = "NORMAL";

let normal = [];
let extended = [];
let history = [];

// ================= APPLY =================
function apply(){

base = Number(document.getElementById("baseTrade").value);
balance = Number(document.getElementById("startBal").value);

step = 0;
wins = 0;
mode = "NORMAL";
history = [];

normal = [
base,
base * 1.55,
base * 2.34,
base * 3.5,
base * 5.25,
base * 7.87
];

extended = [
base * 7.87,
base * 6.6,
base * 5.25,
base * 3.9,
base * 2.7,
base
];

update();
}

// ================= TRADE =================
function getTrade(){

if(mode === "NORMAL"){
return normal[Math.min(step, normal.length - 1)];
}else{
return extended[Math.min(step, extended.length - 1)];
}
}

// ================= LOSS =================
function loss(){

let t = getTrade();
balance -= t;

step++;
wins = 0;

// ENTER EXTENDED MODE
if(step >= 5){
mode = "EXTENDED";
step = 5;
}

history.push({r:"LOSS", t:t, ret:0});
update();
}

// ================= WIN =================
function win(){

let t = getTrade();
let ret = t * 0.92;

balance += ret;

wins++;

if(wins >= 2){
step = 0;
wins = 0;
mode = "NORMAL"; // RESET BACK TO BASE MODE
}
else{
step = Math.max(0, step - 1);
}

history.push({r:"WIN", t:t, ret:ret});
update();
}

// ================= UPDATE =================
function update(){

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + getTrade().toFixed(2);
document.getElementById("step").innerText = step;
document.getElementById("wins").innerText = wins;
document.getElementById("mode").innerText = mode;

let html = "";

history.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x.r}</td>
<td>$${x.t.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("log").innerHTML = html;
}

update();

</script>

</body>
</html>
