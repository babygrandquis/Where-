<script>

// ================= STATE =================
let balance = 0;
let step = 0;

let wins = 0;
let losses = 0;
let total = 0;

let lossStreak = 0;
let winStreak = 0;

let log = [];

// ================= LADDER =================
function getLadder(){
let base = Number(document.getElementById("baseTrade").value);
return [
base,
base * 1.55,
base * 2.34,
base * 3.5,
base * 5.25,
base * 7.87
];
}

function getTrade(){
let ladder = getLadder();
return ladder[Math.min(step, ladder.length - 1)];
}

// ================= UPDATE =================
function update(){

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + getTrade().toFixed(2);
document.getElementById("step").innerText = step;

document.getElementById("total").innerText = total;
document.getElementById("wins").innerText = wins;
document.getElementById("losses").innerText = losses;

let rate = total > 0 ? (wins / total) * 100 : 0;
document.getElementById("rate").innerText = rate.toFixed(1) + "%";

let html = "";

log.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x.res}</td>
<td>$${x.trade.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("table").innerHTML = html;
}

// ================= WIN =================
function win(){

let trade = getTrade();
let ret = trade * 0.92;

balance += ret;

log.push({res:"WIN", trade, ret});

wins++;
total++;

// 🔥 WIN STREAK LOGIC
winStreak++;

// RESET CONDITION (2 WINS)
if(winStreak >= 2){
step = 0;
winStreak = 0;
}

lossStreak = 0;

update();
}

// ================= LOSS =================
function loss(){

let trade = getTrade();

balance -= trade;

log.push({res:"LOSS", trade, ret:0});

step++;
lossStreak++;

winStreak = 0;

losses++;
total++;

update();
}

// ================= RESET =================
function resetTrade(){
step = 0;
winStreak = 0;
lossStreak = 0;
update();
}

// ================= NEW SESSION =================
function newSession(){
step = 0;
winStreak = 0;
lossStreak = 0;
wins = 0;
losses = 0;
total = 0;
log = [];
update();
}

</script>
