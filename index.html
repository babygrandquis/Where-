<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extended Recovery System</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:white}
.header{background:#123a7a;padding:14px;text-align:center;font-weight:bold}
.card{background:#111a2e;margin:10px;padding:12px;border-radius:10px}
button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px;font-weight:bold;cursor:pointer}
.win{background:#39d353}
.loss{background:#dc2626;color:white}
table{width:100%;border-collapse:collapse;margin-top:10px;font-size:12px}
th,td{border:1px solid #222c44;padding:5px;text-align:center}
</style>
</head>

<body>

<div class="header">EXTENDED RECOVERY SYSTEM (5+ LOSS MODE)</div>

<div class="card">
Balance: <b id="bal"></b><br>
Trade: <b id="trd"></b><br>
Loss Streak: <b id="loss"></b>
</div>

<div class="card">
<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

let balance = 85;
let step = 0;
let lossStreak = 0;

let log = [];

// TWO SYSTEMS
let normal = [2.64,4.09,6.18,9.24];
let extended = [13.86,20.78];

function getTrade(){
if(lossStreak >= 5){
return extended[Math.min(step, extended.length-1)];
}
return normal[Math.min(step, normal.length-1)];
}

// LOSS
function loss(){

let t = getTrade();
balance -= t;

log.push({r:"LOSS",t:t,ret:0});

lossStreak++;
step++;

update();
}

// WIN
function win(){

let t = getTrade();
let ret = t * 0.92;

balance += ret;

log.push({r:"WIN",t:t,ret:ret});

// move down ladder
step = Math.max(0, step - 1);

// reset after recovery
if(lossStreak >= 5){
if(step === 0){
lossStreak = 0;
}
}

update();
}

// UPDATE
function update(){

document.getElementById("bal").innerText="$"+balance.toFixed(2);
document.getElementById("trd").innerText="$"+getTrade().toFixed(2);
document.getElementById("loss").innerText=lossStreak;

let html="";
log.forEach((x,i)=>{
html+=`<tr>
<td>${i+1}</td>
<td>${x.r}</td>
<td>$${x.t.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("log").innerHTML=html;
}

update();

</script>

</body>
</html>
