<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exact Recovery Engine</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
background:#123a7a;
padding:14px;
text-align:center;
font-weight:bold;
}

.card{
background:#111a2e;
margin:10px;
padding:12px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.win{background:#39d353;}
.loss{background:#dc2626;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

th,td{
border:1px solid #222c44;
padding:5px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">WEALTH WARRIORS EXACT ENGINE</div>

<div class="card">
Starting Balance
<input id="startBal" type="number" value="85">
<button onclick="apply()">APPLY</button>
</div>

<div class="card">
Balance: <b id="bal"></b><br>
Trade: <b id="trd"></b><br>
State: <b id="state"></b>
</div>

<div class="card">
<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

// ================= LADDER =================
const ladder = [
2.80,
4.34,
6.55,
9.80,
14.70,
22.04
];

// ================= STATE INDEX =================
let pos = 0;
let balance = 0;
let log = [];

// ================= APPLY =================
function apply(){
balance = Number(document.getElementById("startBal").value);
pos = 0;
log = [];
update();
}

// ================= CURRENT TRADE =================
function trade(){
return ladder[pos];
}

// ================= LOSS (NORMAL UP) =================
function loss(){

let t = trade();
balance -= t;

// move UP normally
pos = Math.min(pos + 1, ladder.length - 1);

log.push({r:"LOSS", t:t, ret:0});

update();
}

// ================= WIN (FORCED TRANSITION MAP) =================
function win(){

let t = trade();
let ret = t * 0.92;

balance += ret;

// 🔥 EXACT WIN PATH YOU WANT
if(pos === 5){
pos = 4;   // 22.04 → 14.70
}
else if(pos === 4){
pos = 2;   // 14.70 → 6.55 (skip 9.80)
}
else if(pos === 2){
pos = 0;   // 6.55 → 2.80
}
else{
pos = Math.max(pos - 1, 0);
}

log.push({r:"WIN", t:t, ret:ret});

update();
}

// ================= UPDATE =================
function update(){

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + trade().toFixed(2);
document.getElementById("state").innerText = pos;

let html="";

log.forEach((x,i)=>{
html+=`
<tr>
<td>${i+1}</td>
<td>${x.r}</td>
<td>$${x.t.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("log").innerHTML=html;
}

update();

</script>

</body>
</html>
