<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Recovery System PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
background:#123a7a;
padding:14px;
text-align:center;
font-weight:bold;
}

.card{
background:#111a2e;
margin:10px;
padding:12px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.win{background:#39d353;}
.loss{background:#dc2626;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

th,td{
border:1px solid #222c44;
padding:5px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">WEALTH RECOVERY SYSTEM PRO</div>

<div class="card">

Starting Balance
<input id="startBal" type="number" value="85">

Base Trade
<input id="baseTrade" type="number" value="2.8">

<button onclick="apply()">APPLY</button>

</div>

<div class="card">
Balance: <b id="bal"></b><br>
Trade: <b id="trd"></b><br>
Step: <b id="step"></b><br>
Loss Streak: <b id="loss"></b><br>
Wins: <b id="wins"></b>
</div>

<div class="card">
<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
</div>

<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="log"></tbody>
</table>

<script>

// ================= STATE =================
let balance = 0;
let step = 0;
let wins = 0;
let lossStreak = 0;

let base = 2.8;
let ladder = [];
let history = [];

// ================= APPLY =================
function apply(){

base = Number(document.getElementById("baseTrade").value);
balance = Number(document.getElementById("startBal").value);

ladder = [
base,
base * 1.55,
base * 2.34,
base * 3.5,
base * 5.25,
base * 7.87
];

step = 0;
wins = 0;
lossStreak = 0;
history = [];

update();
}

// ================= GET TRADE =================
function trade(){
return ladder[Math.min(step, ladder.length - 1)];
}

// ================= LOSS =================
function loss(){

let t = trade();
balance -= t;

step = Math.min(step + 1, ladder.length - 1);

lossStreak++;
wins = 0;

history.push({r:"LOSS", t:t, ret:0});

update();
}

// ================= WIN =================
function win(){

let t = trade();
let ret = t * 0.92;

balance += ret;
wins++;

history.push({r:"WIN", t:t, ret:ret});

// ================= NORMAL MODE =================
if(lossStreak < 5){

if(wins >= 2){
step = 0;
wins = 0;
}
else{
step = Math.max(0, step - 1);
}

}

// ================= DEEP LOSS MODE (ONLY FIXED PART) =================
else{

// 🔥 WIN 1 → top recovery level
if(wins === 1){
step = 5; // 22.04
}

// 🔥 WIN 2 → mid level
else if(wins === 2){
step = 4; // 14.70
}

// 🔥 WIN 3 → lower level then RESET
else if(wins === 3){
step = 2; // 6.55

// RESET SYSTEM
step = 0;
wins = 0;
lossStreak = 0;
}

}

update();
}

// ================= UPDATE =================
function update(){

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + trade().toFixed(2);
document.getElementById("step").innerText = step;
document.getElementById("wins").innerText = wins;
document.getElementById("loss").innerText = lossStreak;

let html = "";

history.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x.r}</td>
<td>$${x.t.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("log").innerHTML = html;
}

update();

</script>

</body>
</html>
