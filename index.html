<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Warriors Trade Manager</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
background:#123a7a;
padding:14px;
text-align:center;
font-weight:bold;
}

.card{
background:#111a2e;
margin:10px;
padding:12px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.win{background:#39d353;}
.loss{background:#dc2626;color:white;}
.reset{background:#f59e0b;}
.new{background:#2563eb;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

th,td{
border:1px solid #222c44;
padding:5px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">WEALTH WARRIORS TRADE MANAGER</div>

<div class="card">

Starting Balance
<input id="startBal" type="number" value="85">

Base Trade
<input id="baseTrade" type="number" value="2.8">

</div>

<div class="card">

Balance: <b id="bal">$0.00</b><br>
Next Trade: <b id="trd">$0.00</b><br>
Step: <b id="step">0</b>

</div>

<div class="card">

<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
<button class="reset" onclick="resetTrade()">RESET</button>
<button class="new" onclick="newSession()">NEW SESSION</button>

</div>

<div class="card">

<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<div class="card">

<div>Total Trades: <span id="total">0</span></div>
<div>Wins: <span id="wins">0</span></div>
<div>Losses: <span id="losses">0</span></div>
<div>Win Rate: <span id="rate">0%</span></div>

</div>

<script>

// ================= STATE =================
let balance = 0;
let step = 0;
let wins = 0;
let losses = 0;
let total = 0;
let log = [];

// ================= FIXED LADDER =================
const ladder = [
2.80,
4.35,
6.55,
9.80,
14.70,
22.05
];

// ================= GET =================
function getStart(){
return Number(document.getElementById("startBal").value);
}

// ================= TRADE =================
function getTrade(){
return ladder[Math.min(step, ladder.length - 1)];
}

// ================= UPDATE =================
function update(){

balance = getStart();

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + getTrade().toFixed(2);
document.getElementById("step").innerText = step;

document.getElementById("total").innerText = total;
document.getElementById("wins").innerText = wins;
document.getElementById("losses").innerText = losses;

let rate = total > 0 ? (wins / total) * 100 : 0;
document.getElementById("rate").innerText = rate.toFixed(1) + "%";

let html = "";

log.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x.res}</td>
<td>$${x.trade.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("table").innerHTML = html;
}

// ================= WIN =================
function win(){

let trade = getTrade();
let ret = trade * 0.92;

log.push({res:"WIN", trade, ret});

// 🔥 FAST RECOVERY RULE
if(step >= 3){
step = Math.max(0, step - 1);
} else {
step = 0;
}

wins++;
total++;

update();
}

// ================= LOSS =================
function loss(){

let trade = getTrade();

log.push({res:"LOSS", trade, ret:0});

step++;

losses++;
total++;

update();
}

// ================= RESET =================
function resetTrade(){
step = 0;
update();
}

// ================= NEW SESSION =================
function newSession(){

step = 0;
wins = 0;
losses = 0;
total = 0;
log = [];

update();
}

// ================= INIT =================
update();

</script>

</body>
</html>
