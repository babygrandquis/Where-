<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Warriors Recovery Engine</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
background:#123a7a;
padding:14px;
text-align:center;
font-weight:bold;
}

.card{
background:#111a2e;
margin:10px;
padding:12px;
border-radius:10px;
}

input{
width:100%;
padding:8px;
margin-top:5px;
border-radius:6px;
border:none;
font-size:14px;
}

button{
width:100%;
padding:10px;
margin-top:6px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.win{background:#39d353;}
.loss{background:#dc2626;color:white;}
.apply{background:#16a34a;color:white;}
.reset{background:#f59e0b;}
.new{background:#2563eb;color:white;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:12px;
}

th,td{
border:1px solid #222c44;
padding:5px;
text-align:center;
}
</style>
</head>

<body>

<div class="header">WEALTH WARRIORS RECOVERY ENGINE</div>

<div class="card">

Starting Balance
<input id="startBal" type="number" value="85">

Base Trade
<input id="baseTrade" type="number" value="2.8">

<button class="apply" onclick="applySettings()">APPLY SETTINGS</button>

</div>

<div class="card">
Balance: <b id="bal">$0.00</b><br>
Next Trade: <b id="trd">$0.00</b><br>
Index: <b id="idx">0</b>
</div>

<div class="card">
<button class="win" onclick="win()">WIN</button>
<button class="loss" onclick="loss()">LOSS</button>
<button class="reset" onclick="reset()">RESET</button>
<button class="new" onclick="newSession()">NEW SESSION</button>
</div>

<div class="card">
<table>
<thead>
<tr>
<th>No</th>
<th>Result</th>
<th>Trade</th>
<th>Return</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>
</div>

<script>

// ================= STATE =================
let balance = 0;
let index = 0;

let wins = 0;
let losses = 0;
let total = 0;

let ladder = [];
let log = [];

// ================= APPLY =================
function applySettings(){

let start = Number(document.getElementById("startBal").value);
let base = Number(document.getElementById("baseTrade").value);

balance = start;

// FULL LADDER (EXTENDED RECOVERY ENGINE)
ladder = [
base,
base * 1.55,
base * 2.34,
base * 3.5,
base * 5.25,
base * 7.87,
base * 9.8
];

index = 0;

update();
}

// ================= TRADE =================
function getTrade(){
return ladder[Math.min(index, ladder.length - 1)];
}

// ================= LOSS =================
function loss(){

let trade = getTrade();

balance -= trade;

index = Math.min(index + 1, ladder.length - 1);

losses++;
total++;

log.push({res:"LOSS", trade, ret:0});

update();
}

// ================= WIN (SMART RECOVERY MAP) =================
function win(){

let trade = getTrade();
let ret = trade * 0.92;

balance += ret;

wins++;
total++;

log.push({res:"WIN", trade, ret});

// 🔥 RECOVERY ENGINE LOGIC

if(index >= 6){
index = Math.max(0, index - 2);   // deep recovery
}
else if(index >= 3){
index = Math.max(0, index - 2);   // mid recovery
}
else{
index = Math.max(0, index - 1);   // normal recovery
}

update();
}

// ================= RESET =================
function reset(){
index = 0;
update();
}

// ================= NEW SESSION =================
function newSession(){
index = 0;
wins = 0;
losses = 0;
total = 0;
log = [];
update();
}

// ================= UPDATE =================
function update(){

document.getElementById("bal").innerText = "$" + balance.toFixed(2);
document.getElementById("trd").innerText = "$" + getTrade().toFixed(2);
document.getElementById("idx").innerText = index;

let html = "";

log.forEach((x,i)=>{
html += `
<tr>
<td>${i+1}</td>
<td>${x.res}</td>
<td>$${x.trade.toFixed(2)}</td>
<td>$${x.ret.toFixed(2)}</td>
</tr>`;
});

document.getElementById("table").innerHTML = html;
}

update();

</script>

</body>
</html>
